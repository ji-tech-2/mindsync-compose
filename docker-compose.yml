version: "3.9"

services:

  # =========================
  # JWT Key Generation
  # =========================
  keygen:
    image: alpine
    volumes:
      - keys:/keys
    command: >
      sh -c "
        apk add --no-cache openssl &&
        if [ ! -f /keys/private.pem ]; then
          openssl genrsa -out /keys/private_rsa.pem 2048 &&
          openssl pkcs8 -topk8 -inform PEM -in /keys/private_rsa.pem -out /keys/private.pem -nocrypt &&
          openssl rsa -in /keys/private_rsa.pem -pubout -out /keys/public.pem &&
          rm /keys/private_rsa.pem &&
          echo 'JWT keys generated successfully';
        else
          echo 'JWT keys already exist, skipping generation';
        fi
      "

  # =========================
  # Training Service
  # =========================
  training:
    build:
      context: ./mindsync-model-training
      dockerfile: Dockerfile
    environment:
      - WANDB_API_KEY=${WANDB_API_KEY}
      - WANDB_PROJECT=${WANDB_PROJECT:-mindsync-model}
      - WANDB_ENTITY=${WANDB_ENTITY}
      - MODEL_VERSION=${MODEL_VERSION:-v1.0}
    volumes:
      - ./mindsync-model-training/artifacts:/app/artifacts
    profiles:
      - training
    command: python train.py

  # =========================
  # PostgreSQL Database (Java)
  # =========================
  database:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=mindsync
      - POSTGRES_USER=mindsync
      - POSTGRES_PASSWORD=mindsync_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindsync"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # PostgreSQL Database (Flask)
  # =========================
  database-flask:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=mindsync_model
      - POSTGRES_USER=mindsync
      - POSTGRES_PASSWORD=mindsync_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_flask_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindsync"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # Valkey Cache
  # =========================
  cache:
    image: valkey/valkey:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - cache_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # Backend (Spring Boot Auth)
  # =========================
  backend:
    image: joshmoritty/mindsync-backend:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/mindsync
      - SPRING_DATASOURCE_USERNAME=mindsync
      - SPRING_DATASOURCE_PASSWORD=mindsync_dev_password
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
      - VALKEY_URL=redis://cache:6379
      - RESEND_API=${RESEND_API:-}
      - SPRING_MAIL_HOST=${SPRING_MAIL_HOST:-smtp.gmail.com}
      - SPRING_MAIL_PORT=${SPRING_MAIL_PORT:-587}
      - SPRING_MAIL_USERNAME=${SMTP_USERNAME:-}
      - SPRING_MAIL_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
    volumes:
      - keys:/keys:ro
    entrypoint: >
      sh -c '
        export JWT_PRIVATE_KEY="$(cat /keys/private.pem)" &&
        export JWT_PUBLIC_KEY="$(cat /keys/public.pem)" &&
        exec sh -c "java $$JAVA_OPTS -jar app.jar"
      '
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      keygen:
        condition: service_completed_successfully

  # =========================
  # Inference Service
  # =========================
  inference:
    image: thomasseow/mindsync-model-flask:latest
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WANDB_API_KEY=${WANDB_API_KEY}
      - WANDB_PROJECT=${WANDB_PROJECT:-mindsync-model}
      - WANDB_ENTITY=${WANDB_ENTITY}
      - ARTIFACT_VERSION=${ARTIFACT_VERSION:-latest}
      - DATABASE_URL=postgresql://mindsync:mindsync_dev_password@database-flask:5432/mindsync_model
      - VALKEY_URL=redis://cache:6379
    depends_on:
      database-flask:
        condition: service_healthy
      cache:
        condition: service_healthy
    volumes:
      - artifacts_data:/app/artifacts

  # =========================
  # API Gateway (Kong)
  # =========================
  api-gateway:
    image: clauhan/kong-gateway:latest
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/usr/local/kong/declarative/kong.local.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
    depends_on:
      - inference
      - backend

  # =========================
  # Frontend
  # =========================
  frontend:
    image: ivanchristian005/mindsync-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  postgres_flask_data:
  cache_data:
  keys:
  artifacts_data: